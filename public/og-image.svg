<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none" shape-rendering="geometricPrecision" text-rendering="geometricPrecision">
  <defs>
    <linearGradient id="brandGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="hsl(28, 92%, 54%)"/>
      <stop offset="100%" stop-color="hsl(185, 62%, 42%)"/>
    </linearGradient>

    <radialGradient id="mesh1" cx="78%" cy="18%" r="48%">
      <stop offset="0%" stop-color="hsl(28, 95%, 55%)" stop-opacity="0.42"/>
      <stop offset="55%" stop-color="hsl(28, 92%, 54%)" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="hsl(200, 28%, 7%)" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="mesh2" cx="12%" cy="28%" r="44%">
      <stop offset="0%" stop-color="hsl(185, 62%, 42%)" stop-opacity="0.35"/>
      <stop offset="55%" stop-color="hsl(190, 55%, 35%)" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="hsl(200, 28%, 7%)" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="mesh3" cx="72%" cy="72%" r="46%">
      <stop offset="0%" stop-color="hsl(32, 90%, 50%)" stop-opacity="0.34"/>
      <stop offset="55%" stop-color="hsl(28, 85%, 45%)" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="hsl(200, 28%, 7%)" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="mesh4" cx="38%" cy="88%" r="40%">
      <stop offset="0%" stop-color="hsl(185, 58%, 38%)" stop-opacity="0.24"/>
      <stop offset="100%" stop-color="hsl(200, 28%, 7%)" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="veil" cx="50%" cy="42%" rx="65%" ry="55%">
      <stop offset="22%" stop-color="hsl(200, 28%, 7%)" stop-opacity="0"/>
      <stop offset="100%" stop-color="hsl(200, 28%, 7%)" stop-opacity="0.74"/>
    </radialGradient>

    <style>
      @font-face {
        font-family: "Dancing Script";
        src: url("fonts/DancingScript-Medium.ttf") format("truetype");
        font-weight: 500;
        font-style: normal;
      }
      .name-script {
        font-family: "Dancing Script", cursive;
        font-weight: 500;
        letter-spacing: 0.03em;
      }
    </style>
  </defs>

  <rect width="1200" height="630" fill="hsl(25, 8%, 7%)"/>

  <rect width="1200" height="630" fill="url(#mesh1)"/>
  <rect width="1200" height="630" fill="url(#mesh2)"/>
  <rect width="1200" height="630" fill="url(#mesh3)"/>
  <rect width="1200" height="630" fill="url(#mesh4)"/>
  <rect width="1200" height="630" fill="url(#veil)"/>

  <rect x="64" y="64" width="1072" height="502" rx="28" fill="hsl(25, 6%, 10%)" fill-opacity="0.9" stroke="hsl(25, 8%, 17%)" stroke-width="2"/>
  <rect x="64" y="64" width="1072" height="502" rx="28" fill="none" stroke="hsl(22, 68%, 55%)" stroke-opacity="0.32" stroke-width="1"/>

  <text x="600" y="118" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="20" font-weight="500" letter-spacing="0.34em" fill="hsl(25, 6%, 54%)">PORTFOLIO</text>

  <text x="600" y="300" text-anchor="middle" class="name-script" font-size="108">
    <tspan fill="hsl(30, 12%, 95%)">Sriram </tspan><tspan fill="url(#brandGrad)">Kancherla</tspan>
  </text>

  <text x="600" y="368" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="30" font-weight="500" fill="hsl(22, 68%, 55%)">
    ML Engineer &#183; Data Analyst &#183; Student
  </text>

  <text x="600" y="424" text-anchor="middle" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="26" font-weight="500" fill="hsl(30, 12%, 95%)">
    ML Intern @ FlyRank AI
  </text>

  <text x="600" y="472" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="19" font-weight="400" fill="hsl(25, 6%, 54%)">
    VIT Vellore &#183; Computer Science
  </text>

  <circle cx="600" cy="522" r="5" fill="hsl(22, 68%, 55%)"/>
</svg>
