name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_SITE_URL: https://sriramkancherla.github.io
          VITE_WEB3FORMS_ACCESS_KEY: ${{ secrets.VITE_WEB3FORMS_ACCESS_KEY }}

      - name: Prepare GitHub Pages output
        run: |
          rm -rf docs
          cp -r dist docs
          cp docs/index.html docs/404.html
          touch docs/.nojekyll

      - name: Deploy to docs/ on main
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: main
          destination_dir: docs
          keep_files: true
          commit_message: "deploy: ${{ github.sha }} [skip ci]"
