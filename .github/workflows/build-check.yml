name: Build check

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm

      - run: npm ci

      - name: Production build (Cloudflare Pages)
        run: npm run build
        env:
          VITE_SITE_URL: https://sriramkancherla.pages.dev
